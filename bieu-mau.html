<!DOCTYPE html>
<html lang="vi" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XBuild ERP — Biểu mẫu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
.toolbar{display:flex;align-items:center;gap:10px;margin:18px 0;flex-wrap:wrap}
.toolbar-search{max-width:320px;width:100%}
.fm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.fm-card{display:flex;flex-direction:column;background:var(--md-sys-color-surface);border:1px solid var(--md-sys-color-outline-variant);border-radius:var(--md-sys-shape-corner-large);box-shadow:var(--md-sys-elevation-level1);padding:18px;transition:box-shadow var(--duration-fast),border-color var(--duration-fast)}
.fm-card:hover{box-shadow:var(--md-sys-elevation-level2)}
.fm-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.fm-ic{width:40px;height:40px;border-radius:var(--md-sys-shape-corner-medium);background:var(--md-sys-color-primary-container);color:var(--md-sys-color-on-primary-container);display:grid;place-items:center;flex:none}
.fm-ic .material-symbols-outlined{font-size:22px}
.fm-name{font:var(--type-body-strong);color:var(--md-sys-color-on-surface)}
.fm-meta{font:var(--type-caption);color:var(--md-sys-color-on-surface-variant);margin-top:3px;display:flex;align-items:center;gap:6px}
.fm-menuwrap{margin-left:auto;position:relative;flex:none}
.fm-trigger{display:flex;align-items:center;gap:8px;background:var(--md-sys-color-surface-container-low);border-radius:var(--md-sys-shape-corner-medium);padding:10px 12px;font:var(--type-body-sm);color:var(--md-sys-color-on-surface)}
.fm-trigger .material-symbols-outlined{font-size:18px;color:var(--md-sys-color-primary);flex:none}
.fm-trigger .lbl{color:var(--md-sys-color-on-surface-variant)}
.fm-trigger b{font-weight:600}
.fm-trigger.none .material-symbols-outlined{color:var(--md-sys-color-on-surface-variant)}
.fm-foot{display:flex;align-items:center;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--md-sys-color-outline-variant)}
.fm-foot .spacer{flex:1}
/* menu */
.menu{position:absolute;top:34px;right:0;min-width:184px;background:var(--md-sys-color-surface);border:1px solid var(--md-sys-color-outline-variant);border-radius:var(--md-sys-shape-corner-medium);box-shadow:var(--md-sys-elevation-level3);padding:6px;z-index:30;display:none}
.menu.open{display:block}
.menu-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:var(--md-sys-shape-corner-small);font:var(--type-body-sm);color:var(--md-sys-color-on-surface);cursor:pointer;text-decoration:none;background:none;border:none;width:100%;text-align:left}
.menu-item:hover{background:var(--md-sys-color-surface-container-low)}
.menu-item .material-symbols-outlined{font-size:18px;color:var(--md-sys-color-on-surface-variant)}
.menu-item.danger,.menu-item.danger .material-symbols-outlined{color:var(--md-sys-color-error)}
.menu-sep{height:1px;background:var(--md-sys-color-outline-variant);margin:6px 4px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">XB</div><span class="name">XBuild ERP</span></div>
    <div class="nav-label">Tổng quan</div>
    <a class="nav-item" href="trang-chu.html"><span class="material-symbols-outlined">home</span><span>Trang chủ</span></a>
    <a class="nav-item" href="viec-cua-toi.html"><span class="material-symbols-outlined">check_circle</span><span>Việc của tôi</span><span class="count">5</span></a>
    <div class="nav-label">Không gian làm việc</div>
    <a class="nav-item" href="du-lieu.html"><span class="material-symbols-outlined">table_chart</span><span>Dữ liệu</span></a>
    <a class="nav-item" href="workflow.html"><span class="material-symbols-outlined">account_tree</span><span>Workflow</span></a>
    <a class="nav-item active" aria-current="page"><span class="material-symbols-outlined">description</span><span>Biểu mẫu</span></a>
    <a class="nav-item"><span class="material-symbols-outlined">folder</span><span>File</span></a>
    <a class="nav-item"><span class="material-symbols-outlined">bar_chart</span><span>Báo cáo</span></a>
    <div class="bottom">
      <a class="nav-item" href="cai-dat-thanh-vien.html"><span class="material-symbols-outlined">settings</span><span>Cài đặt</span></a>
      <a class="nav-item"><span class="material-symbols-outlined">help</span><span>Trợ giúp</span></a>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="search"><span class="material-symbols-outlined" style="font-size:18px">search</span>Tìm kiếm hoặc gõ lệnh…<span class="kbd">Ctrl K</span></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="themeToggle" aria-label="Đổi giao diện"><span class="material-symbols-outlined">dark_mode</span></button>
      <button class="icon-btn" aria-label="Thông báo"><span class="material-symbols-outlined">notifications</span></button>
      <div class="avatar" aria-label="Tài khoản Phương">PN</div>
    </header>
    <div class="content">
      <div class="page-head">
        <div><h1>Biểu mẫu</h1></div>
        <div class="spacer"></div>
        <button class="btn btn-filled"><span class="material-symbols-outlined">add</span>Tạo biểu mẫu</button>
      </div>

      <div class="toolbar">
        <div class="search toolbar-search"><span class="material-symbols-outlined" style="font-size:18px">search</span>Tìm biểu mẫu…</div>
        <div class="spacer" style="flex:1"></div>
        <div class="seg"><button class="active">Tất cả</button><button>Đang dùng</button><button>Nháp</button></div>
      </div>

      <div class="fm-grid" id="fmGrid"></div>
    </div>
  </div>
</div>

<script>
var html=document.documentElement,tg=document.getElementById('themeToggle'),tico=tg.querySelector('.material-symbols-outlined');
tg.addEventListener('click',function(){var d=html.classList.toggle('dark');html.classList.toggle('light',!d);tico.textContent=d?'light_mode':'dark_mode';});

/* [tên, số trường, trạng thái(active|draft), workflow|null] */
var FORMS=[
 ['Thêm Leads · Tạo contact',6,'active','Workflow 1 — Tiếp nhận Lead mới'],
 ['Tạo user mới',5,'active','Tạo user mới'],
 ['Đơn xin nghỉ phép',5,'active','Đơn xin nghỉ phép'],
 ['Khảo sát hài lòng khách hàng',8,'draft',null]
];
document.getElementById('fmGrid').innerHTML=FORMS.map(function(f){
  var st=f[2]==='active'?'<span class="badge success"><span class="material-symbols-outlined">check_circle</span>Đang dùng</span>':'<span class="badge neutral"><span class="material-symbols-outlined">edit_note</span>Nháp</span>';
  var trig=f[3]
    ? '<div class="fm-trigger"><span><span class="lbl">Áp dụng </span><b>'+f[3]+'</b></span></div>'
    : '<div class="fm-trigger none"><span class="material-symbols-outlined">link_off</span><span class="lbl">Chưa gắn workflow</span></div>';
  return '<div class="fm-card">'
    +'<div class="fm-top"><span class="fm-ic"><span class="material-symbols-outlined">description</span></span>'
    +'<div style="flex:1;min-width:0"><div class="fm-name">'+f[0]+'</div><div class="fm-meta">'+st+'<span>·</span>'+f[1]+' trường</div></div>'
    +'<div class="fm-menuwrap"><button class="icon-btn" aria-label="Tùy chọn" onclick="toggleMenu(event,this)"><span class="material-symbols-outlined">more_horiz</span></button>'
    +'<div class="menu"><button class="menu-item"><span class="material-symbols-outlined">content_copy</span>Nhân bản</button>'
    +'<a class="menu-item" href="bieu-mau-editor.html"><span class="material-symbols-outlined">open_in_new</span>Mở biểu mẫu</a>'
    +'<div class="menu-sep"></div><button class="menu-item danger"><span class="material-symbols-outlined">delete</span>Xóa</button></div></div></div>'
    +trig
    +'<div class="fm-foot"><button class="btn btn-text"><span class="material-symbols-outlined">link</span>Copy link</button><span class="spacer"></span><a class="btn btn-tonal" href="bieu-mau-editor.html" style="text-decoration:none"><span class="material-symbols-outlined">edit</span>Sửa</a></div>'
    +'</div>';
}).join('');

function closeMenus(){document.querySelectorAll('.menu.open').forEach(function(m){m.classList.remove('open');});}
function toggleMenu(e,b){e.stopPropagation();var m=b.nextElementSibling;var o=m.classList.contains('open');closeMenus();if(!o)m.classList.add('open');}
document.addEventListener('click',closeMenus);
</script>
</body>
</html>
